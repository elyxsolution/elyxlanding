  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #08080C;
      --surface:  #0F0F16;
      --border:   rgba(255,255,255,0.07);
      --accent:   #6C63FF;
      --accent2:  #A78BFA;
      --text-1:   #F0EFF8;
      --text-2:   rgba(240,239,248,0.55);
      --text-3:   rgba(240,239,248,0.3);
      --radius:   14px;
      --sans:     'Inter', system-ui, -apple-system, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--sans);
      overflow: hidden;
    }

    /* ── canvas bg ── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── glow orbs ── */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0;
      animation: orbFloat 12s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(108,99,255,0.22) 0%, transparent 70%);
      top: -180px; left: -120px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(167,139,250,0.15) 0%, transparent 70%);
      bottom: -150px; right: -100px;
      animation-delay: -6s;
    }

    @keyframes orbFloat {
      0%   { opacity: 0; transform: translateY(0px) scale(1); }
      20%  { opacity: 1; }
      50%  { transform: translateY(-40px) scale(1.05); }
      80%  { opacity: 1; }
      100% { opacity: 0; transform: translateY(0px) scale(1); }
    }

    /* ── grid overlay ── */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
      pointer-events: none;
    }

    /* ── page ── */
    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    /* ── badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid rgba(108,99,255,0.35);
      background: rgba(108,99,255,0.08);
      color: var(--accent2);
      font-size: 11.5px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.3s forwards;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent); }
      50%       { opacity: 0.5; box-shadow: 0 0 16px var(--accent2); }
    }

    /* ── wordmark ── */
    .wordmark {
      font-size: clamp(3.2rem, 9vw, 7rem);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.5s forwards;
    }
    .wordmark-elyx { color: var(--text-1); }
    .wordmark-sol  {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── tagline ── */
    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      color: var(--text-2);
      font-weight: 400;
      max-width: 440px;
      line-height: 1.65;
      margin-bottom: 2.8rem;
      opacity: 0;
      animation: fadeUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.7s forwards;
    }

    /* ── divider ── */
    .divider {
      width: 48px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 0 auto 2.8rem;
      opacity: 0;
      animation: fadeUp 0.6s ease 0.85s forwards;
    }

    /* ── socials ── */
    .socials {
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 1s forwards;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-2);
      font-size: 13px;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      transition: color 0.2s, border-color 0.2s, background 0.2s, transform 0.2s;
      letter-spacing: 0.01em;
    }
    .social-btn:hover {
      color: var(--text-1);
      border-color: rgba(108,99,255,0.4);
      background: rgba(108,99,255,0.08);
      transform: translateY(-2px);
    }
    .social-btn svg {
      width: 16px; height: 16px;
      flex-shrink: 0;
      opacity: 0.75;
      transition: opacity 0.2s;
    }
    .social-btn:hover svg { opacity: 1; }

    /* ── footer ── */
    .footer {
      position: fixed;
      bottom: 1.6rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11.5px;
      color: var(--text-3);
      letter-spacing: 0.04em;
      white-space: nowrap;
      opacity: 0;
      animation: fadeUp 0.6s ease 1.2s forwards;
    }

    /* ── shared keyframe ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── particle canvas ── */
    #particle-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── responsive ── */
    @media (max-width: 480px) {
      .wordmark { font-size: 3rem; }
      .socials  { flex-direction: column; gap: 0.7rem; }
      .social-btn { width: 200px; justify-content: center; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; animation-delay: 0s !important; }
    }
  </style>

  <script>
    /* ── particle system ── */
    const canvas = document.getElementById('particle-canvas');
    const ctx    = canvas.getContext('2d');

    let W, H, particles = [], mouse = { x: -9999, y: -9999 };
    const COUNT = 90;
    const ACCENT = [108, 99, 255];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    window.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    class Particle {
      constructor() { this.reset(true); }

      reset(initial) {
        this.x  = Math.random() * (W || 1200);
        this.y  = initial ? Math.random() * (H || 800) : H + 10;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = -(0.2 + Math.random() * 0.4);
        this.r  = 0.8 + Math.random() * 1.4;
        this.a  = 0;
        this.maxA = 0.12 + Math.random() * 0.18;
        this.life = 0;
        this.maxLife = 200 + Math.random() * 400;
      }

      update() {
        const dx = this.x - mouse.x;
        const dy = this.y - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 130) {
          const force = (130 - dist) / 130;
          this.vx += (dx / dist) * force * 0.08;
          this.vy += (dy / dist) * force * 0.08;
        }
        this.vx *= 0.98;
        this.vy *= 0.98;
        this.x  += this.vx;
        this.y  += this.vy;
        this.life++;
        const t = this.life / this.maxLife;
        this.a = t < 0.1 ? t * 10 * this.maxA
               : t > 0.8 ? (1 - t) * 5 * this.maxA
               : this.maxA;
        if (this.life >= this.maxLife || this.y < -20) this.reset(false);
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${ACCENT.join(',')},${this.a.toFixed(3)})`;
        ctx.fill();
      }
    }

    for (let i = 0; i < COUNT; i++) particles.push(new Particle());

    function animate() {
      ctx.clearRect(0, 0, W, H);
      /* draw faint connections */
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const p1 = particles[i], p2 = particles[j];
          const dx = p1.x - p2.x, dy = p1.y - p2.y;
          const d  = dx * dx + dy * dy;
          if (d < 14400) {
            const str = (1 - d / 14400) * Math.min(p1.a, p2.a) * 0.6;
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y);
            ctx.lineTo(p2.x, p2.y);
            ctx.strokeStyle = `rgba(${ACCENT.join(',')},${str.toFixed(3)})`;
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }
    animate();
  </script>
